services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: pharmashield
      POSTGRES_PASSWORD: pharmashield_password
      POSTGRES_DB: pharmashield_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  mongodb:
    image: mongo:6.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: pharmashield
      MONGO_INITDB_ROOT_PASSWORD: pharmashield_password
      MONGO_INITDB_DATABASE: pharmashield_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      POSTGRES_URL: ${POSTGRES_URL:-postgresql+asyncpg://pharmashield:pharmashield_password@postgres:5432/pharmashield_db}
      MONGO_URI: ${MONGO_URI:-mongodb://pharmashield:pharmashield_password@mongodb:27017/pharmashield_db?authSource=admin}
      APP_ENV: ${APP_ENV}
      CORS_ORIGINS: ${CORS_ORIGINS}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${BACKEND_PORT}:8000"
    depends_on:
      - postgres
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      INTERNAL_API_BASE_URL: http://backend:8000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT}:3000"

volumes:
  postgres_data:
  mongodb_data:
