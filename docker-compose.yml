services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: pharmashield
      POSTGRES_PASSWORD: pharmashield_password
      POSTGRES_DB: pharmashield_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      POSTGRES_URL: ${POSTGRES_URL:-postgresql+asyncpg://pharmashield:pharmashield_password@postgres:5432/pharmashield_db}
      APP_ENV: ${APP_ENV}
      CORS_ORIGINS: ${CORS_ORIGINS}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${BACKEND_PORT}:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT}:3000"

volumes:
  postgres_data:
